name: links

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  link_checker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build with Astro
      run: npm run build

    - name: Link Checker
      id: lychee
      uses: lycheeverse/lychee-action@v2
      with:
        args: --root-dir dist/ --verbose --no-progress 'dist/**/*.html'
        fail: true
